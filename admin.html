<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STA | Teacher Exam Creator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #006400; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .topic-section { margin-bottom: 25px; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; }
        .topic-title { font-weight: bold; font-size: 1.2rem; color: #333; margin-bottom: 10px; display: block; background: #f9f9f9; padding: 5px 10px; border-radius: 4px; }
        .q-item { display: flex; align-items: flex-start; margin-bottom: 10px; padding: 8px; border-bottom: 1px dashed #eee; }
        .q-item:last-child { border-bottom: none; }
        input[type="checkbox"] { margin-right: 15px; margin-top: 5px; transform: scale(1.2); cursor: pointer; }
        .generate-box { position: sticky; bottom: 20px; background: #006400; color: white; padding: 20px; border-radius: 8px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); margin-top: 30px; text-align: center; }
        button { background: white; color: #006400; border: none; padding: 10px 25px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #e0e0e0; }
        #link-output { margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.2); border-radius: 4px; word-break: break-all; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>Siemens Technical Academy</h1>
    <p>Select the questions you want to include in the exam:</p>
    
    <div id="master-list"></div>

    <div class="generate-box">
        <span id="count">Selected: 0 Questions</span><br><br>
        <button onclick="generateLink()">GENERATE EXAM LINK</button>
        <div id="link-output">Your link will appear here...</div>
        <button id="copy-btn" style="display:none; margin-top:10px; background:#444; color:white;" onclick="copyLink()">Copy Link</button>
    </div>
</div>

<script src="questions.js"></script>
<script>
    const listContainer = document.getElementById('master-list');
    
    // 1. Build the list from questions.js
    for (let topic in masterQuestionBank) {
        let section = document.createElement('div');
        section.className = 'topic-section';
        section.innerHTML = `<span class="topic-title">${topic}</span>`;
        
        masterQuestionBank[topic].forEach(q => {
            section.innerHTML += `
                <div class="q-item">
                    <input type="checkbox" value="${q.id}" onchange="updateCount()">
                    <span>${q.q}</span>
                </div>
            `;
        });
        listContainer.appendChild(section);
    }

    // 2. Update selected count
    function updateCount() {
        const checked = document.querySelectorAll('input:checked').length;
        document.getElementById('count').innerText = `Selected: ${checked} Questions`;
    }

    // 3. Generate the magic link
    function generateLink() {
        const selected = Array.from(document.querySelectorAll('input:checked')).map(cb => cb.value);
        if (selected.length === 0) {
            alert("Please select at least one question!");
            return;
        }
        
        // Base URL is your site
        const baseUrl = window.location.origin + window.location.pathname.replace('admin.html', '');
        const finalLink = `${baseUrl}?ids=${selected.join(',')}`;
        
        document.getElementById('link-output').innerText = finalLink;
        document.getElementById('copy-btn').style.display = 'inline-block';
    }

    function copyLink() {
        const link = document.getElementById('link-output').innerText;
        navigator.clipboard.writeText(link);
        alert("Link copied! Send this to your students.");
    }
</script>

</body>
</html>
